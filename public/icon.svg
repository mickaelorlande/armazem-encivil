<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e3a8a"/>
  <!-- Warehouse roof / triangle -->
  <polygon points="256,80 440,200 72,200" fill="#ffffff" opacity="0.95"/>
  <!-- Main building body -->
  <rect x="112" y="200" width="288" height="200" rx="4" fill="#ffffff" opacity="0.95"/>
  <!-- Door (center) -->
  <rect x="216" y="300" width="80" height="100" rx="4" fill="#1e3a8a"/>
  <!-- Left window -->
  <rect x="136" y="232" width="64" height="56" rx="4" fill="#1e3a8a" opacity="0.6"/>
  <!-- Right window -->
  <rect x="312" y="232" width="64" height="56" rx="4" fill="#1e3a8a" opacity="0.6"/>
  <!-- Ground line -->
  <rect x="72" y="396" width="368" height="12" rx="6" fill="#ffffff" opacity="0.4"/>
  <!-- "E" letter subtle mark -->
  <text x="256" y="160" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#1e3a8a" text-anchor="middle" opacity="0.15">E</text>
</svg>
