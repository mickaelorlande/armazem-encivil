<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A atualizar…</title>
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #1e3a8a; color: #fff; }
  body { display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
</style>
</head>
<body>
  <p>A limpar a cache antiga e a atualizar a app…</p>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
      } catch (e) { /* melhor esforço — segue para a app de qualquer forma */ }
      location.replace('/');
    })();
  </script>
</body>
</html>
